,["path",{d:"M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z",key:"ruj8y"}]]),fo=[{id:"dashboard",modulo:"Dashboard",titulo:"O que mostra o Dashboard",chaves:"painel inicio visão geral resumo indicadores kpi",texto:"É a visão geral do escritório. Mostra os números principais (clientes, processos ativos, prazos em 7 dias, publicações não lidas), o valor total em causas ativas, os andamentos capturados, os próximos prazos por urgência, a distribuição de processos por status e por área, os andamentos recentes capturados pelo robô e as publicações recentes."},{id:"add-cliente",modulo:"Clientes",titulo:"Como cadastrar um cliente",chaves:"adicionar novo cliente cadastro cpf cnpj cep endereço pessoa física jurídica",texto:'Em Clientes, clique em "Novo Cliente". Preencha nome, tipo (PF/PJ), CPF/CNPJ, contatos e endereço (o CEP preenche o endereço automaticamente via ViaCEP). Você também pode importar vários de uma vez em "Importar CSV".'},{id:"arquivar-cliente",modulo:"Clientes",titulo:"Arquivar / restaurar cliente",chaves:"arquivar excluir apagar deletar restaurar remover inativar",texto:'Nada é excluído no sistema — apenas arquivado. No card do cliente, clique no ícone de caixa (Arquivar); ele sai da lista ativa mas os processos vinculados são mantidos. Para ver ou restaurar, use o botão "Arquivados" na barra de busca.'},{id:"add-processo",modulo:"Processos",titulo:"Como cadastrar um processo",chaves:"adicionar novo processo cnj numero vara tribunal comarca área fase valor causa polo autor réu objeto",texto:'Em Processos, clique em "Novo Processo". Informe o número CNJ, cliente vinculado, vara, tribunal, comarca, área, fase, polo do cliente (autor/réu), objeto/assunto, parte contrária, advogado, valor da causa e data de distribuição. Dá para acompanhar a timeline de andamentos e os prazos de cada processo.'},{id:"importar-lote",modulo:"Processos",titulo:"Importar processos em lote",chaves:"importar lote massa vários planilha csv colar lista integra número cnj",texto:'Em Processos → "Importar em Lote", cole uma lista (tabela copiada do Integra/planilha, CSV, ou só os números CNJ). O sistema identifica número, cliente e parte adversa, infere o tribunal, cria os clientes que faltam e cadastra tudo. Opcionalmente enriquece cada um pelo DataJud.'},{id:"importar-ia",modulo:"Processos",titulo:"Importar processo com IA (print/foto/DataJud)",chaves:"ia inteligência artificial imagem print foto citação datajud texto extrair automático",texto:'Em Processos → "Importar com IA" você pode: enviar um print/foto de qualquer sistema (PJe, e-SAJ, Integra…) e a IA extrai número, partes, tribunal e valor; colar um texto; ou consultar o DataJud pelo número. Requer a chave de IA (Anthropic) em Configurações para as opções de imagem/texto.'},{id:"arquivar-processo",modulo:"Processos",titulo:"Arquivar / restaurar processo",chaves:"arquivar excluir apagar processo restaurar encerrado",texto:'Assim como os clientes, processos não são excluídos — só arquivados. Use o ícone de caixa no card. Os andamentos, prazos e publicações são preservados. Veja e restaure em "Arquivados".'},{id:"prazos",modulo:"Agenda",titulo:"Cadastrar e acompanhar prazos",chaves:"agenda prazo audiência dias úteis feriado responsável alerta calendário vencimento",texto:"Na Agenda você cadastra prazos (tipo, descrição, data/hora, dias úteis ou corridos, responsável e alerta). A contagem em dias úteis desconta sábados, domingos e feriados. Há visão em calendário e em lista, com cores por urgência."},{id:"ciencia",modulo:"Agenda",titulo:"Ciência do prazo (quem viu)",chaves:"ciência visto confirmar responsável viu prazo aguardando",texto:'Cada prazo mostra se o responsável tomou ciência. Enquanto ninguém confirma, aparece "Aguardando ciência" (âmbar). Ao clicar em "Confirmar ciência" e escolher o advogado, fica registrado quem viu e quando.'},{id:"publicacoes-filtros",modulo:"Publicações",titulo:"Filtrar publicações (arquivadas, agendadas…)",chaves:"publicações intimações filtro chips não lida lida agendada arquivada tribunal período vínculo",texto:"Use os chips com contadores: Ativas, Não lidas, Lidas, Agendadas (com prazo gerado), Arquivadas e Todas. Há ainda filtro por tribunal, por vínculo (vinculadas/não vinculadas a processo), por período e busca livre."},{id:"publicacao-abrir",modulo:"Publicações",titulo:"Abrir uma publicação e agir sobre ela",chaves:"abrir publicação clicar detalhe conteúdo gerar prazo arquivar vincular link tribunal",texto:"Clique em qualquer publicação para abrir o detalhe com o conteúdo completo, o link para o site do tribunal e a opção de vincular a um processo. De dentro do detalhe você pode Arquivar ou Gerar Prazo."},{id:"robo-datajud",modulo:"Monitoramento",titulo:"Robô de andamentos (DataJud) — grátis",chaves:"robô robo datajud cnj andamentos automático grátis 6 horas movimentações",texto:"O robô consulta a API pública do CNJ (DataJud) e cadastra automaticamente os novos andamentos de cada processo. Roda a cada 6 horas quando ativado. É gratuito. Como o DataJud é lento, cada execução processa um lote (os processos há mais tempo sem verificação)."},{id:"intimacoes-cnj",modulo:"Monitoramento",titulo:"Intimações pela OAB (CNJ / DJEN) — grátis",chaves:"intimações publicações oab procurador djen comunica cnj grátis diário justiça nacional advogado",texto:'O sistema captura as suas intimações de todo o Brasil pelo número da OAB, direto do Diário de Justiça Eletrônico Nacional (DJEN) do CNJ — de graça, sem provedor pago. Cadastre-se como Procurador (com a OAB) em Monitoramento e use o botão verde "Capturar intimações agora"; roda também 2×/dia automaticamente.'},{id:"busca-nome",modulo:"Monitoramento",titulo:"Descobrir processos pelo nome (Escavador)",chaves:"busca nacional nome cliente parte escavador pago token descobrir processos cpf cnpj provedor",texto:"Para descobrir TODOS os processos pelo nome de um cliente (não pela OAB), é preciso um provedor pago que indexa as partes (ex.: Escavador), pois o CNJ gratuito não busca por nome de parte. Cadastre o token do Escavador em Monitoramento para ativar. Processos já capturados pelo seu nome de procurador não se repetem."},{id:"relatorios",modulo:"Relatórios",titulo:"Gerar relatórios de processos",chaves:"relatório filtrar ativos inativos valor causa autor réu área objeto últimos andamentos exportar csv imprimir pdf",texto:"Em Relatórios você filtra a carteira por situação (ativos/inativos), área, cliente, polo (autor/réu), parte contrária, objeto, tribunal, fase, advogado, faixa de valor da causa e período. Cada processo mostra os últimos 3 andamentos. Dá para exportar em CSV e imprimir/gerar PDF."},{id:"config",modulo:"Configurações",titulo:"Configurar escritório, advogados e IA",chaves:"configurações escritório oab advogados feriados tribunais chave api anthropic ia integração",texto:"Em Configurações você define os dados do escritório, cadastra os advogados, os feriados municipais, as credenciais de tribunais e a chave de IA (Anthropic) usada na importação por imagem/texto e nesta Ajuda."},{id:"login",modulo:"Segurança",titulo:"Acesso, login e privacidade",chaves:"login senha acesso segurança privacidade sair lgpd proteção dados",texto:'O sistema exige login. Os dados só aparecem para a sua conta — ninguém mais os acessa. Use o botão "Sair" no topo para encerrar a sessão. Nada é excluído do sistema: registros são apenas arquivados.'}],fi=[...new Set(fo.map(e=>e.modulo))];async function fl(e,t){let r=fo.map(e=>`[${e.modulo}] ${e.titulo}: ${e.texto}`).join("\n"),a=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"x-api-key":t,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,system:`Voc\xea \xe9 o assistente de ajuda do JurisGest Pro, um sistema de gest\xe3o jur\xeddica para escrit\xf3rios de a
